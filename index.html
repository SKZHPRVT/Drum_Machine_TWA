<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
    <title>Drum Machine Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 8px;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .logo {
            color: #ff4757;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .bpm-compact {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 6px 12px;
        }

        .bpm-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #2a2a2a;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: background 0.15s;
        }

        .bpm-btn:active {
            background: #ff4757;
            color: #fff;
        }

        .bpm-value {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            min-width: 42px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        .bpm-label {
            color: #666;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pads-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            aspect-ratio: 2 / 1;
            touch-action: none;
        }

        .pad {
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
            transition: transform 0.04s ease-out, box-shadow 0.04s ease-out, border-color 0.15s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .pad:active,
        .pad.active {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6), inset 0 2px 4px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .pad::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.18) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 12px;
        }

        .pad .pad-label {
            position: relative;
            z-index: 1;
            pointer-events: none;
        }

        /* Цвета пэдов */
        .pad-kick  { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .pad-snare { background: linear-gradient(135deg, #b8730a, #e67e22); }
        .pad-hhcl  { background: linear-gradient(135deg, #b7950b, #f1c40f); }
        .pad-hhop  { background: linear-gradient(135deg, #1e8449, #2ecc71); }
        .pad-tomhi { background: linear-gradient(135deg, #1f618d, #3498db); }
        .pad-tommid{ background: linear-gradient(135deg, #6c3483, #9b59b6); }
        .pad-tomlo { background: linear-gradient(135deg, #0e6655, #1abc9c); }
        .pad-clap  { background: linear-gradient(135deg, #ad1457, #e91e63); }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .vol-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 6px 12px;
        }

        .vol-icon {
            color: #666;
            font-size: 14px;
        }

        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            border: 2px solid #555;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .vol-num {
            color: #aaa;
            font-size: 12px;
            min-width: 28px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-record {
            background: #2a2a2a;
            color: #aaa;
        }

        .btn-record.recording {
            background: #ff4757;
            color: #fff;
            animation: pulse-record 0.7s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.5); }
            50% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
        }

        .btn-play {
            background: #2ecc71;
            color: #fff;
            flex: 1;
        }

        .btn-play:disabled {
            background: #1a3a25;
            color: #555;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #444;
            color: #fff;
        }

        .btn-stop:disabled {
            background: #1a1a1a;
            color: #444;
            cursor: not-allowed;
        }

        .btn-clear {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            font-size: 10px;
            padding: 8px 12px;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .status-dot.ready { background: #2ecc71; }
        .status-dot.recording { background: #ff4757; animation: pulse-record 0.7s infinite; }
        .status-dot.playing { background: #f1c40f; }

        .status-text {
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Хэдер -->
        <div class="header">
            <span class="logo">🥁 BeatBox</span>
            <div class="bpm-compact">
                <button class="bpm-btn" id="bpmDown">−</button>
                <span class="bpm-value" id="bpmValue">120</span>
                <span class="bpm-label">bpm</span>
                <button class="bpm-btn" id="bpmUp">+</button>
            </div>
        </div>

        <!-- Пэды -->
        <div class="pads-grid" id="padsGrid">
            <div class="pad pad-kick"  data-pad="0"><span class="pad-label">KICK</span></div>
            <div class="pad pad-snare" data-pad="1"><span class="pad-label">SNARE</span></div>
            <div class="pad pad-hhcl"  data-pad="2"><span class="pad-label">HH CL</span></div>
            <div class="pad pad-hhop"  data-pad="3"><span class="pad-label">HH OP</span></div>
            <div class="pad pad-tomhi" data-pad="4"><span class="pad-label">TOM HI</span></div>
            <div class="pad pad-tommid"data-pad="5"><span class="pad-label">TOM MID</span></div>
            <div class="pad pad-tomlo" data-pad="6"><span class="pad-label">TOM LO</span></div>
            <div class="pad pad-clap"  data-pad="7"><span class="pad-label">CLAP</span></div>
        </div>

        <!-- Управление -->
        <div class="controls-row">
            <div class="vol-group">
                <span class="vol-icon">🔈</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                <span class="vol-num" id="volNum">80</span>
            </div>
            <button class="btn btn-record" id="recordBtn">⏺ REC</button>
        </div>

        <div class="controls-row">
            <button class="btn btn-play" id="playBtn" disabled>▶ PLAY</button>
            <button class="btn btn-stop" id="stopBtn" disabled>■ STOP</button>
            <button class="btn btn-clear" id="clearBtn">✕ CLR</button>
        </div>

        <!-- Статус -->
        <div class="status-bar">
            <span class="status-text">
                <span class="status-dot ready" id="statusDot"></span>
                <span id="statusLabel">READY</span>
            </span>
        </div>
    </div>

    <script>
        (function() {
            // ============ TELEGRAM ============
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // ============ AUDIO ENGINE ============
            let audioCtx = null;
            let masterGain = null;
            const sampleBuffers = [];
            let volume = 0.8;

            // ============ STATE ============
            let isRecording = false;
            let recordedEvents = [];
            let recordingStartTime = 0;
            let isPlaying = false;
            let playbackTimeout = null;
            let bpm = 120;
            const activeTouches = new Map(); // touch.identifier -> padIndex

            // ============ DOM REFS ============
            const padsGrid = document.getElementById('padsGrid');
            const allPads = document.querySelectorAll('.pad');
            const recordBtn = document.getElementById('recordBtn');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volNum = document.getElementById('volNum');
            const bpmValue = document.getElementById('bpmValue');
            const bpmDown = document.getElementById('bpmDown');
            const bpmUp = document.getElementById('bpmUp');
            const statusDot = document.getElementById('statusDot');
            const statusLabel = document.getElementById('statusLabel');

            // ============ AUDIO GENERATION ============
            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = volume;
                masterGain.connect(audioCtx.destination);

                sampleBuffers[0] = generateKick();
                sampleBuffers[1] = generateSnare();
                sampleBuffers[2] = generateHHClosed();
                sampleBuffers[3] = generateHHOpen();
                sampleBuffers[4] = generateTom(300);
                sampleBuffers[5] = generateTom(200);
                sampleBuffers[6] = generateTom(120);
                sampleBuffers[7] = generateClap();
            }

            function generateKick(length = 0.4) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const p = i / len;
                    const freq = 150 * Math.pow(0.2, p);
                    const env = Math.exp(-t * 15);
                    const click = t < 0.005 ? (1 - t / 0.005) * 0.4 : 0;
                    d[i] = Math.sin(2 * Math.PI * freq * t) * env * 0.8 + click;
                }
                return buf;
            }

            function generateSnare(length = 0.3) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const env = Math.exp(-t * 20);
                    const tone = Math.sin(2 * Math.PI * 180 * t) * 0.45;
                    const noise = (Math.random() * 2 - 1) * 0.55;
                    d[i] = (tone + noise) * env * 0.7;
                }
                return buf;
            }

            function generateHHClosed(length = 0.08) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const env = Math.exp(-t * 60);
                    let s = (Math.random() * 2 - 1);
                    if (i > 0) s = s - d[i - 1] * 0.5;
                    d[i] = s * env * 0.4;
                }
                return buf;
            }

            function generateHHOpen(length = 0.25) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const env = Math.exp(-t * 10);
                    let s = (Math.random() * 2 - 1);
                    if (i > 0) s = s - d[i - 1] * 0.3;
                    d[i] = s * env * 0.45;
                }
                return buf;
            }

            function generateTom(freqBase, length = 0.35) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const p = i / len;
                    const freq = freqBase * Math.pow(0.5, p);
                    const env = Math.exp(-t * 12);
                    d[i] = Math.sin(2 * Math.PI * freq * t) * env * 0.6;
                }
                return buf;
            }

            function generateClap(length = 0.25) {
                const sr = audioCtx.sampleRate;
                const len = Math.floor(sr * length);
                const buf = audioCtx.createBuffer(1, len, sr);
                const d = buf.getChannelData(0);
                for (let i = 0; i < len; i++) {
                    const t = i / sr;
                    const env = Math.exp(-t * 25) * 0.7 + (t > 0.02 && t < 0.04 ? 0.35 : 0) * Math.exp(-(t - 0.03) * 40);
                    d[i] = (Math.random() * 2 - 1) * env * 0.5;
                }
                return buf;
            }

            // ============ PLAYBACK ============
            function playPad(padIndex, time) {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const source = audioCtx.createBufferSource();
                source.buffer = sampleBuffers[padIndex];
                source.connect(masterGain);
                source.start(time || 0);

                // Запись
                if (isRecording) {
                    const eventTime = (time || audioCtx.currentTime) - recordingStartTime;
                    recordedEvents.push({ padIndex, time: eventTime });
                }
            }

            // ============ MULTITOUCH ============
            function getPadAtPoint(x, y) {
                const el = document.elementFromPoint(x, y);
                if (el) {
                    const pad = el.closest('.pad');
                    if (pad) return parseInt(pad.dataset.pad);
                }
                return null;
            }

            function activatePad(padIndex) {
                const pad = allPads[padIndex];
                pad.classList.add('active');
            }

            function deactivatePad(padIndex) {
                // Проверяем, нет ли других пальцев на этом пэде
                for (const [id, idx] of activeTouches) {
                    if (idx === padIndex) return; // ещё активен
                }
                const pad = allPads[padIndex];
                pad.classList.remove('active');
            }

            padsGrid.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                for (const touch of e.changedTouches) {
                    if (activeTouches.has(touch.identifier)) continue;

                    const padIndex = getPadAtPoint(touch.clientX, touch.clientY);
                    if (padIndex !== null) {
                        activeTouches.set(touch.identifier, padIndex);
                        activatePad(padIndex);
                        playPad(padIndex);
                    }
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                for (const touch of e.changedTouches) {
                    if (activeTouches.has(touch.identifier)) {
                        const padIndex = activeTouches.get(touch.identifier);
                        activeTouches.delete(touch.identifier);
                        deactivatePad(padIndex);
                    }
                }
            });

            document.addEventListener('touchcancel', (e) => {
                for (const touch of e.changedTouches) {
                    if (activeTouches.has(touch.identifier)) {
                        const padIndex = activeTouches.get(touch.identifier);
                        activeTouches.delete(touch.identifier);
                        deactivatePad(padIndex);
                    }
                }
            });

            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // ============ RECORDING ============
            function setStatus(mode) {
                statusDot.className = 'status-dot';
                if (mode === 'ready') {
                    statusDot.classList.add('ready');
                    statusLabel.textContent = 'READY';
                } else if (mode === 'recording') {
                    statusDot.classList.add('recording');
                    statusLabel.textContent = 'RECORDING';
                } else if (mode === 'playing') {
                    statusDot.classList.add('playing');
                    statusLabel.textContent = 'PLAYING';
                }
            }

            recordBtn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                if (!isRecording) {
                    // Начать запись
                    isRecording = true;
                    recordedEvents = [];
                    recordingStartTime = audioCtx.currentTime;
                    recordBtn.classList.add('recording');
                    recordBtn.textContent = '⏺ REC ●';
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                    setStatus('recording');
                    if (isPlaying) stopPlayback();
                } else {
                    // Остановить запись
                    isRecording = false;
                    recordBtn.classList.remove('recording');
                    recordBtn.textContent = '⏺ REC';
                    setStatus('ready');
                    if (recordedEvents.length === 0) {
                        playBtn.disabled = true;
                    }
                }
            });

            // ============ PLAYBACK CONTROLS ============
            function startPlayback() {
                if (recordedEvents.length === 0) return;

                isPlaying = true;
                playBtn.disabled = true;
                stopBtn.disabled = false;
                recordBtn.disabled = true;
                clearBtn.disabled = true;
                setStatus('playing');

                const now = audioCtx.currentTime;
                playbackStartTime = now;

                // Планируем все события
                recordedEvents.forEach(event => {
                    playPad(event.padIndex, now + event.time);
                });

                // Автостоп
                const lastTime = Math.max(...recordedEvents.map(e => e.time));
                const duration = (lastTime + 0.5) * 1000;
                playbackTimeout = setTimeout(() => {
                    stopPlayback();
                }, duration);
            }

            function stopPlayback() {
                isPlaying = false;
                playBtn.disabled = false;
                stopBtn.disabled = true;
                recordBtn.disabled = false;
                clearBtn.disabled = false;
                setStatus('ready');
                if (playbackTimeout) {
                    clearTimeout(playbackTimeout);
                    playbackTimeout = null;
                }
            }

            playBtn.addEventListener('click', () => {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                startPlayback();
            });

            stopBtn.addEventListener('click', stopPlayback);

            clearBtn.addEventListener('click', () => {
                recordedEvents = [];
                playBtn.disabled = true;
                stopBtn.disabled = true;
                if (isPlaying) stopPlayback();
                setStatus('ready');
            });

            // ============ VOLUME ============
            volumeSlider.addEventListener('input', () => {
                volume = parseInt(volumeSlider.value) / 100;
                volNum.textContent = volumeSlider.value;
                if (masterGain) {
                    masterGain.gain.setValueAtTime(volume, audioCtx.currentTime);
                }
            });

            // ============ BPM ============
            function updateBPM() {
                bpmValue.textContent = bpm;
            }

            bpmDown.addEventListener('click', () => {
                bpm = Math.max(40, bpm - 1);
                updateBPM();
            });

            bpmUp.addEventListener('click', () => {
                bpm = Math.min(240, bpm + 1);
                updateBPM();
            });

            // Долгое нажатие для быстрого изменения BPM
            let bpmInterval = null;
            function startBPMChange(delta) {
                bpm = Math.max(40, Math.min(240, bpm + delta));
                updateBPM();
                bpmInterval = setInterval(() => {
                    bpm = Math.max(40, Math.min(240, bpm + delta));
                    updateBPM();
                }, 80);
            }

            function stopBPMChange() {
                if (bpmInterval) {
                    clearInterval(bpmInterval);
                    bpmInterval = null;
                }
            }

            bpmDown.addEventListener('pointerdown', () => startBPMChange(-1));
            bpmDown.addEventListener('pointerup', stopBPMChange);
            bpmDown.addEventListener('pointerleave', stopBPMChange);
            bpmUp.addEventListener('pointerdown', () => startBPMChange(1));
            bpmUp.addEventListener('pointerup', stopBPMChange);
            bpmUp.addEventListener('pointerleave', stopBPMChange);

            // ============ INIT ============
            updateBPM();
            setStatus('ready');

            // iOS audio hack
            document.addEventListener('touchstart', () => {
                if (!audioCtx) initAudio();
            }, { once: true });

            console.log('🥁 BeatBox Pro ready! Мультитач активен.');
        })();
    </script>
</body>
</html>
